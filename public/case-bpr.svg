<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2ecaa0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Paper document (analog) -->
  <rect x="60" y="60" width="100" height="130" rx="4" fill="white" opacity="0.18" transform="rotate(-5 110 125)"/>
  <rect x="74" y="80" width="72" height="5" rx="1.5" fill="white" opacity="0.3" transform="rotate(-5 110 82)"/>
  <rect x="74" y="92" width="60" height="5" rx="1.5" fill="white" opacity="0.2" transform="rotate(-5 104 94)"/>
  <rect x="74" y="104" width="72" height="5" rx="1.5" fill="white" opacity="0.2" transform="rotate(-5 110 106)"/>
  <rect x="74" y="116" width="45" height="5" rx="1.5" fill="white" opacity="0.2" transform="rotate(-5 96 118)"/>
  <!-- Pen icon -->
  <line x1="140" y1="170" x2="155" y2="155" stroke="white" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Arrow flow -->
  <path d="M195 130 Q 240 100 285 130" stroke="white" stroke-width="2.5" opacity="0.35" fill="none" stroke-linecap="round"/>
  <path d="M275 120 L288 130 L278 140" stroke="white" stroke-width="2.5" opacity="0.35" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Digital flowchart -->
  <!-- Start node -->
  <rect x="320" y="50" width="80" height="36" rx="18" fill="white" opacity="0.2"/>
  <rect x="338" y="64" width="44" height="8" rx="2" fill="white" opacity="0.35"/>
