  <rect x="330" y="110" width="60" height="36" rx="6" fill="white" opacity="0.15"/>
  <rect x="340" y="122" width="40" height="6" rx="2" fill="white" opacity="0.25"/>
  <!-- Decision diamond -->
  <polygon points="450,128 480,108 510,128 480,148" fill="white" opacity="0.15"/>
  <!-- End boxes -->
  <rect x="420" y="170" width="60" height="36" rx="6" fill="white" opacity="0.15"/>
  <rect x="430" y="182" width="40" height="6" rx="2" fill="white" opacity="0.25"/>
  <rect x="500" y="170" width="60" height="36" rx="6" fill="white" opacity="0.15"/>
  <rect x="510" y="182" width="40" height="6" rx="2" fill="white" opacity="0.25"/>
  <!-- Flow arrows -->
  <line x1="360" y1="86" x2="360" y2="110" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="390" y1="128" x2="450" y2="128" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="480" y1="148" x2="450" y2="170" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <line x1="480" y1="148" x2="530" y2="170" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <!-- Bottom: digital dashboard -->
  <rect x="310" y="230" width="260" height="50" rx="8" fill="white" opacity="0.1"/>
  <rect x="322" y="242" width="30" height="26" rx="4" fill="#2ecaa0" opacity="0.25"/>
  <rect x="360" y="248" width="30" height="20" rx="4" fill="white" opacity="0.15"/>
  <rect x="398" y="244" width="30" height="24" rx="4" fill="#2ecaa0" opacity="0.2"/>
  <rect x="436" y="252" width="30" height="16" rx="4" fill="white" opacity="0.15"/>
  <rect x="474" y="240" width="30" height="28" rx="4" fill="#2ecaa0" opacity="0.2"/>
  <rect x="512" y="246" width="30" height="22" rx="4" fill="white" opacity="0.15"/>
  <!-- Decorative -->
  <circle cx="560" cy="40" r="22" fill="white" opacity="0.04"/>
  <circle cx="40" cy="260" r="28" fill="white" opacity="0.04"/>
